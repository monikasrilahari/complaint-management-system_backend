server.port=8080

# ==========================================
# ACTIVE DATABASE: H2 In-Memory (MySQL Mode)
# ==========================================
spring.datasource.url=jdbc:h2:mem:complaint_db;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Database Initialization
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# DATABASE OPTION: MySQL (Port 3306)
# ==========================================
# To use a local MySQL server, uncomment the following and comment the H2 section above.
# spring.datasource.url=jdbc:mysql://localhost:3306/complaint_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# Enable logging of SQL statements
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
